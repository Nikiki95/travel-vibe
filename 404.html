<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seite nicht gefunden - TravelVibe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            opacity: 0.5;
            line-height: 1;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            max-width: 400px;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: white;
            color: #FF6B6B;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="icon">🌍</div>
    <div class="error-code">404</div>
    <h1>Wir konnten diese Seite nicht finden</h1>
    <p>Aber keine Sorge - es gibt 100+ andere tolle Reiseziele, die auf dich warten!</p>
    <a href="/" class="btn">Zurück zu TravelVibe</a>
</body>
</html>
